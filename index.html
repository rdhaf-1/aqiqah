<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Tasyakuran Aqiqah - Jennaira Khalisa Dira</title>
    <style>
        /* Reset margin & padding dasar agar pas di layar */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Latar belakang web dibuat warna krem lembut menyesuaikan palet warna undangan */
        body {
            background-color: #f7f3f0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden; /* Mencegah scroll horizontal */
        }

        /* Container utama dibatasi maksimal 480px untuk tampilan HP */
        .invitation-wrapper {
            max-width: 480px; 
            width: 100%;
            margin: 0 auto;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* Styling untuk container gambar (section) */
        .img-section {
            width: 100%;
            border: none;
            line-height: 0; /* Menghapus jarak kecil di bawah gambar */
            
            /* CSS AWAL UNTUK ANIMASI: Tersembunyi */
            opacity: 0; /* Tidak terlihat */
            transform: translateY(50px); /* Tergeser ke bawah sedikit */
            
            /* Transisi yang halus saat muncul */
            transition: opacity 1.2s ease-out, transform 1s ease-out;
            
            /* Pastikan gambar dalam section ini responsif */
            img {
                width: 100%;
                height: auto;
                display: block;
            }
        }

        /* KELAS CSS YANG DITAMBAHKAN JAVASCRIPT: Menjadikan terlihat */
        .img-section.visible {
            opacity: 1; /* Terlihat penuh */
            transform: translateY(0); /* Kembali ke posisi semula */
        }

        /* Opsional: Tambahkan ruang kosong di paling bawah agar section terakhir bisa muncul sepenuhnya */
        .final-spacer {
            height: 100px;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="invitation-wrapper">
        <!-- Bagian 1: Sampul (image_0.png) -->
        <div class="img-section">
            <img src="./1.png" alt="Sampul Undangan Aqiqah Jennaira" loading="lazy">
        </div>

        <!-- Bagian 2: Keluarga (image_1.png) -->
        <div class="img-section">
            <img src="./2.png" alt="Ilustrasi Keluarga" loading="lazy">
        </div>

        <!-- Bagian 3: Detail Acara (image_2.png) -->
        <div class="img-section">
            <img src="./3.png" alt="Waktu dan Detail Acara Tasyakuran" loading="lazy">
        </div>

        <!-- Bagian 4: Lokasi & QR Code (image_3.png) -->
        <div class="img-section">
            <img src="./4.png" alt="Denah dan QR Code Lokasi" loading="lazy">
        </div>

        <div class="final-spacer"></div>
    </div>

    <!-- JAVASCRIPT UNTUK MEMICU ANIMASI SAAT SCROLL -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Ambil semua section gambar yang ingin dianimasikan
            const sections = document.querySelectorAll('.img-section');

            // Opsi untuk Intersection Observer
            const options = {
                root: null, // Menggunakan viewport (layar) sebagai referensi
                threshold: 0.15, // Picu animasi saat 15% bagian gambar terlihat
                rootMargin: "0px"
            };

            // Membuat fungsi Observer
            const observer = new IntersectionObserver(function(entries, observer) {
                entries.forEach(entry => {
                    // Jika section masuk ke viewport
                    if (entry.isIntersecting) {
                        // Tambahkan kelas .visible untuk memicu animasi CSS
                        entry.target.classList.add('visible');
                        // Berhenti mengamati section ini setelah muncul agar tidak berulang
                        observer.unobserve(entry.target);
                    }
                });
            }, options);

            // Perintahkan observer untuk mengamati setiap section
            sections.forEach(section => {
                observer.observe(section);
            });
        });
    </script>

</body>
</html>
