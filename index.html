<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Tasyakuran Aqiqah - Jennaira Khalisa Dira</title>
    <style>
        /* Reset & Pengaturan Dasar */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ebe5df; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #5a4a42;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .main-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: #fdfbf7;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            position: relative;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
        .main-container::-webkit-scrollbar {
            display: none;
        }

        .page-section {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            position: relative;
            background-color: #fdfbf7;
        }
        .page-section:nth-child(even) { background-color: #f7f3ed; }

        .section-label {
            font-size: 10pt;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #8c786c;
            margin-bottom: 15px;
            font-weight: 600;
            text-align: center;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.6s ease-out 0.2s;
        }

        .card-wrapper {
            width: 100%;
            max-height: 80vh;
            background: #ffffff;
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 8px 24px rgba(90, 74, 66, 0.05);
            border: 1px solid rgba(230, 220, 210, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.95) translateY(15px);
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative; /* Penting untuk teks nama tamu */
        }

        .card-wrapper img {
            width: 100%;
            height: auto;
            max-height: 76vh;
            object-fit: contain;
            border-radius: 10px;
        }

        /* --- STYLING KHUSUS UNTUK NAMA TAMU DINAMIS --- */
        .guest-name-container {
            position: absolute;
            /* Angka top: 62% ini adalah perkiraan letak garis pada gambar 1.jpg. 
               Jika tulisannya kurang pas di atas garis, silakan ubah angka 62% ini (misal ke 60% atau 65%) */
            top: 62%; 
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            text-align: center;
            z-index: 5;
        }

        .guest-name-text {
            font-family: 'Georgia', serif; /* Font klasik/elegan */
            font-size: 1.2rem;
            font-weight: bold;
            color: #6a5344;
            letter-spacing: 1px;
            /* Latar belakang semi-transparan sedikit untuk memastikan teks terbaca di atas gambar */
            background-color: rgba(253, 251, 247, 0.6); 
            padding: 2px 15px;
            border-radius: 8px;
        }
        /* ---------------------------------------------- */

        .page-section.active .section-label { opacity: 1; transform: translateY(0); }
        .page-section.active .card-wrapper { opacity: 1; transform: scale(1) translateY(0); }

        .scroll-hint {
            position: absolute;
            bottom: 15px;
            font-size: 8pt;
            color: #a39288;
            letter-spacing: 1px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
            60% { transform: translateY(-2px); }
        }

        .nav-indicators {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }
        .indicator-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(90, 74, 66, 0.2);
            transition: all 0.3s ease;
        }
        .indicator-dot.active { background-color: #8c786c; transform: scale(1.4); }
    </style>
</head>
<body>

    <div class="main-container" id="scrollContainer">
        
        <!-- HALAMAN 1: SAMPUL -->
        <div class="page-section active" data-index="0">
            <h2 class="section-label">Undangan Tasyakuran</h2>
            <div class="card-wrapper">
                <img src="./1.png" alt="Sampul Undangan">
                
                <!-- ELEMEN NAMA TAMU MUNCUL DI SINI -->
                <div class="guest-name-container">
                    <span class="guest-name-text" id="guestNameOutput">Nama Tamu</span>
                </div>
                
            </div>
            <div class="scroll-hint">Geser ke bawah ↓</div>
        </div>

        <!-- HALAMAN 2: KELUARGA -->
        <div class="page-section" data-index="1">
            <h2 class="section-label">Keluarga Bahagia</h2>
            <div class="card-wrapper">
                <img src="./2.png" alt="Foto Keluarga">
            </div>
        </div>

        <!-- HALAMAN 3: DETAIL ACARA -->
        <div class="page-section" data-index="2">
            <h2 class="section-label">Detail Acara</h2>
            <div class="card-wrapper">
                <img src="./3.png" alt="Waktu dan Tempat">
            </div>
        </div>

        <!-- HALAMAN 4: LOKASI MAPS -->
        <div class="page-section" data-index="3">
            <h2 class="section-label">Lokasi & Denah</h2>
            <div class="card-wrapper">
                <img src="./4.png" alt="Peta Lokasi">
            </div>
        </div>

    </div>

    <!-- Navigasi Titik Samping -->
    <div class="nav-indicators">
        <div class="indicator-dot active"></div>
        <div class="indicator-dot"></div>
        <div class="indicator-dot"></div>
        <div class="indicator-dot"></div>
    </div>

    <!-- JAVASCRIPT ANIMASI DAN URL PARAMETER -->
    <script>
        // --- SCRIPT 1: MENGAMBIL NAMA DARI LINK ---
        document.addEventListener("DOMContentLoaded", function() {
            // Membaca link URL (contoh: ?to=Budi+Santoso)
            const urlParams = new URLSearchParams(window.location.search);
            const guestName = urlParams.get('to');
            
            // Jika ada parameter 'to', ganti teksnya. Jika tidak, kosongkan.
            const nameElement = document.getElementById('guestNameOutput');
            if (guestName) {
                nameElement.textContent = guestName;
            } else {
                nameElement.style.display = 'none'; // Sembunyikan jika link tidak ada namanya
            }
        });

        // --- SCRIPT 2: ANIMASI SCROLL HALAMAN ---
        const container = document.getElementById('scrollContainer');
        const sections = document.querySelectorAll('.page-section');
        const dots = document.querySelectorAll('.indicator-dot');

        const observerOptions = {
            root: container,
            style: null,
            threshold: 0.5
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    sections.forEach(sec => sec.classList.remove('active'));
                    dots.forEach(dot => dot.classList.remove('active'));

                    entry.target.classList.add('active');
                    
                    const index = entry.target.getAttribute('data-index');
                    if(dots[index]) {
                        dots[index].classList.add('active');
                    }
                }
            });
        }, observerOptions);

        sections.forEach(section => observer.observe(section));
    </script>

</body>
</html>
